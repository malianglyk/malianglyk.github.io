<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Snake Game</title>
    <style>
        body {
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }
        h1 {
            color: #ffffff;
            margin-bottom: 15px;
        }
        #gameCanvas {
            border: 3px solid #4cd137;
            background-color: #000000;
        }
        .tip-text {
            color: #cccccc;
            margin-top: 18px;
            font-size: 17px;
        }
    </style>
</head>
<body>
    <h1>Classic Snake Game</h1>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <p class="tip-text">Use Arrow Keys to Move | Refresh Page to Restart Game</p>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const blockSize = 20;
        const totalBlocks = canvas.width / blockSize;

        let snake = [{x: 10, y: 10}];
        let food = generateFood();
        let direction = {x: 1, y: 0};
        let nextDirection = {x: 1, y: 0};
        let gameSpeed = 110;
        let score = 0;

        function generateFood() {
            return {
                x: Math.floor(Math.random() * totalBlocks),
                y: Math.floor(Math.random() * totalBlocks)
            };
        }

        document.addEventListener('keydown', (event) => {
            switch(event.key) {
                case 'ArrowUp':
                    if (direction.y !== 1) nextDirection = {x: 0, y: -1};
                    break;
                case 'ArrowDown':
                    if (direction.y !== -1) nextDirection = {x: 0, y: 1};
                    break;
                case 'ArrowLeft':
                    if (direction.x !== 1) nextDirection = {x: -1, y: 0};
                    break;
                case 'ArrowRight':
                    if (direction.x !== -1) nextDirection = {x: 1, y: 0};
                    break;
            }
        });

        function drawBlock(targetX, targetY, fillColor) {
            ctx.fillStyle = fillColor;
            ctx.fillRect(targetX * blockSize, targetY * blockSize, blockSize - 1, blockSize - 1);
        }

        function updateGame() {
            direction = {...nextDirection};
            const snakeHead = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};

            if (snakeHead.x < 0 || snakeHead.x >= totalBlocks || snakeHead.y < 0 || snakeHead.y >= totalBlocks) {
                alert(`Game Over! Your Final Score: ${score}\nRefresh page to play again`);
                return;
            }

            for (let segment of snake) {
                if (segment.x === snakeHead.x && segment.y === snakeHead.y) {
                    alert(`Game Over! Your Final Score: ${score}\nRefresh page to play again`);
                    return;
                }
            }

            snake.unshift(snakeHead);

            if (snakeHead.x === food.x && snakeHead.y === food.y) {
                score += 10;
                food = generateFood();
            } else {
                snake.pop();
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBlock(food.x, food.y, '#e84118');
            snake.forEach((segment, index) => {
                drawBlock(segment.x, segment.y, index === 0 ? '#4cd137' : '#00cec9');
            });
            setTimeout(updateGame, gameSpeed);
        }
        updateGame();
    </script>
</body>
</html>
